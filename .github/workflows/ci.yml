name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install PostgreSQL test binaries
        run: sudo apt-get update && sudo apt-get install -y postgresql postgresql-client
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install --no-deps -e .
      - name: Lint and format
        run: |
          ruff check app tests migrations
          ruff format --check app tests migrations
      - name: Type check
        run: mypy app
      - name: Test with coverage
        env:
          PG_BIN: /usr/lib/postgresql/16/bin
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=75
      - name: Show PostgreSQL test diagnostics
        if: failure()
        run: find /tmp/pytest-of-runner -path '*/postgres.log' -type f -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \; || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml

  infrastructure:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.12.4
      - name: Terraform-compatible formatting and validation
        run: |
          tofu fmt -recursive -check infra/terraform
          tofu -chdir=infra/terraform init -backend=false
          tofu -chdir=infra/terraform validate

  security-and-image:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immutable candidate image
        run: docker build --tag 2care-clinic-voice-agent:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 2care-clinic-voice-agent:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif
