name: Deploy staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ENVIRONMENT: staging
  PMS_PROVIDER: cliniko
  TF_STATE_BUCKET: 2care-voice-tfstate-519570322025

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
      CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify temporary deployment credentials
        run: |
          printf 'AWS access key length: %s\n' "${#AWS_ACCESS_KEY_ID}"
          printf 'AWS secret key length: %s\n' "${#AWS_SECRET_ACCESS_KEY}"
          aws sts get-caller-identity --region "$AWS_REGION"

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.4

      - name: Create protected Terraform state bucket
        run: |
          aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null || \
            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled
          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Bootstrap repository and application secret container
        working-directory: infra/terraform
        run: |
          tofu init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${ENVIRONMENT}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"
          if ! tofu state show aws_ecr_repository.app >/dev/null 2>&1; then
            tofu import \
              -var="container_image=placeholder.invalid/2care-clinic-voice-agent:${GITHUB_SHA}" \
              aws_ecr_repository.app 2care-clinic-voice-agent
          fi
          tofu apply -auto-approve \
            -target=aws_kms_key.main \
            -target=aws_kms_alias.main \
            -target=aws_ecr_repository.app \
            -target=aws_secretsmanager_secret.application \
            -var="container_image=placeholder.invalid/2care-clinic-voice-agent:${GITHUB_SHA}"

      - name: Build and publish immutable image
        id: image
        env:
          ECR_REGISTRY: 519570322025.dkr.ecr.ap-south-1.amazonaws.com
          ECR_REPOSITORY: 2care-clinic-voice-agent
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA}-${GITHUB_RUN_ID}"
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Populate application secret out of Terraform state
        env:
          CLINIKO_API_KEY: ${{ secrets.CLINIKO_API_KEY }}
          CLINIKO_SHARD: ${{ secrets.CLINIKO_SHARD }}
          CLINIKO_USER_AGENT: ${{ secrets.CLINIKO_USER_AGENT }}
          CLINIKO_PATIENT_IDS_BY_PHONE_JSON: ${{ secrets.CLINIKO_PATIENT_IDS_BY_PHONE_JSON }}
          RETELL_TOOL_TOKEN: ${{ secrets.RETELL_TOOL_TOKEN }}
        working-directory: infra/terraform
        run: |
          : "${RETELL_TOOL_TOKEN:?RETELL_TOOL_TOKEN must be configured as a GitHub Actions secret}"
          APP_SECRET_ARN="$(tofu output -raw application_secret_arn)"
          REQUEST_HMAC_SECRET="$(openssl rand -hex 32)"
          AVAILABILITY_TOKEN_SECRET="$(openssl rand -hex 32)"
          jq -cn \
            --arg request_hmac "$REQUEST_HMAC_SECRET" \
            --arg availability_token "$AVAILABILITY_TOKEN_SECRET" \
            --arg cliniko_api_key "$CLINIKO_API_KEY" \
            --arg cliniko_shard "$CLINIKO_SHARD" \
            --arg cliniko_user_agent "$CLINIKO_USER_AGENT" \
            --arg patient_ids "$CLINIKO_PATIENT_IDS_BY_PHONE_JSON" \
            --arg retell_tool_token "$RETELL_TOOL_TOKEN" \
            '{
              REQUEST_HMAC_SECRET: $request_hmac,
              AVAILABILITY_TOKEN_SECRET: $availability_token,
              CLINIKO_API_KEY: $cliniko_api_key,
              CLINIKO_SHARD: $cliniko_shard,
              CLINIKO_USER_AGENT: $cliniko_user_agent,
              CLINIKO_PATIENT_IDS_BY_PHONE_JSON: $patient_ids,
              RETELL_TOOL_TOKEN: $retell_tool_token
            }' > application-secret.json
          aws secretsmanager put-secret-value \
            --secret-id "$APP_SECRET_ARN" \
            --secret-string file://application-secret.json
          rm application-secret.json

      - name: Apply staging infrastructure
        working-directory: infra/terraform
        run: |
          CERTIFICATE_ARGS=()
          if [[ -n "${CERTIFICATE_ARN:-}" ]]; then
            CERTIFICATE_ARGS+=("-var=certificate_arn=${CERTIFICATE_ARN}")
          fi
          WAF_ARGS=("-var=enable_waf=false")
          tofu apply -auto-approve \
            -var="environment=${ENVIRONMENT}" \
            -var="pms_provider=${PMS_PROVIDER}" \
            -var="container_image=${{ steps.image.outputs.uri }}" \
            "${CERTIFICATE_ARGS[@]}" \
            "${WAF_ARGS[@]}"

      - name: Run database migrations
        env:
          ECS_CLUSTER: 2care-voice-staging
          ECS_SERVICE: api
        run: |
          TASK_DEFINITION="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"
          if [[ -z "$TASK_DEFINITION" || "$TASK_DEFINITION" == "None" ]]; then
            echo "Unable to resolve the staging task definition" >&2
            exit 1
          fi

          NETWORK_CONFIG="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' \
            --output json)"
          SUBNETS="$(jq -r '.subnets | join(",")' <<<"$NETWORK_CONFIG")"
          SECURITY_GROUPS="$(jq -r '.securityGroups | join(",")' <<<"$NETWORK_CONFIG")"
          ASSIGN_PUBLIC_IP="$(jq -r '.assignPublicIp' <<<"$NETWORK_CONFIG")"

          RUN_TASK_RESPONSE="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --output json)"
          if [[ "$(jq '.failures | length' <<<"$RUN_TASK_RESPONSE")" != "0" ]]; then
            jq -c '.failures' <<<"$RUN_TASK_RESPONSE" >&2
            exit 1
          fi
          MIGRATION_TASK_ARN="$(jq -r '.tasks[0].taskArn // empty' <<<"$RUN_TASK_RESPONSE")"
          if [[ -z "$MIGRATION_TASK_ARN" ]]; then
            echo "ECS did not start the migration task" >&2
            exit 1
          fi

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$MIGRATION_TASK_ARN"
          MIGRATION_EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$MIGRATION_TASK_ARN" \
            --query 'tasks[0].containers[?name==`api`].exitCode | [0]' \
            --output text)"
          if [[ "$MIGRATION_EXIT_CODE" != "0" ]]; then
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$MIGRATION_TASK_ARN" \
              --query 'tasks[0].containers[?name==`api`].[lastStatus,exitCode,reason]' \
              --output table >&2
            exit 1
          fi

      - name: Configure Retell staging agent
        env:
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
          RETELL_TOOL_TOKEN: ${{ secrets.RETELL_TOOL_TOKEN }}
        run: |
          : "${RETELL_API_KEY:?RETELL_API_KEY must be configured as a GitHub Actions secret}"
          BACKEND_URL="$(cd infra/terraform && tofu output -raw api_base_url)"
          export BACKEND_URL
          node scripts/provision_retell_agent.mjs
